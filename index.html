<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yanis Game</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: gold; font-weight: bold; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>VIES: <span id="vie">3</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0, vie = 3, gameActive = true;
        const img = new Image();
        img.src = 'image.JPEG'; // Respecte tes majuscules !
        const audio = new Audio('caca.mp3');
        audio.loop = true;

        let target = { x: 50, y: 50, size: 100, sx: 4, sy: 4 };

        function draw() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, target.x, target.y, target.size, target.size);
            target.x += target.sx; target.y += target.sy;
            if (target.x < 0 || target.x > canvas.width - target.size) target.sx *= -1;
            if (target.y < 0 || target.y > canvas.height - target.size) target.sy *= -1;
            requestAnimationFrame(draw);
        }

        window.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            if (audio.paused) audio.play();
            const t = e.touches[0];
            if (t.clientX >= target.x && t.clientX <= target.x + target.size && t.clientY >= target.y && t.clientY <= target.y + target.size) {
                score++; document.getElementById('score').innerText = score;
                target.x = Math.random() * (canvas.width - 100);
                target.y = Math.random() * (canvas.height - 100);
                target.sx *= 1.1; target.sy *= 1.1;
            } else {
                vie--; document.getElementById('vie').innerText = vie;
                if (vie <= 0) { gameActive = false; alert("Perdu ! Score: " + score); location.reload(); }
            }
        });
        img.onload = draw;
    </script>
</body>
</html>
