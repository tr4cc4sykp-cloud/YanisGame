<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-CACA : ULTIMATE FIX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Orbitron', sans-serif; color: white; user-select: none; -webkit-user-select: none; }
        canvas { display: block; background: #000; }

        /* INTERFACE SIMPLE ET SOLIDE */
        .ui-screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(0,0,0,0.9); }
        .hidden { display: none !important; }
        
        h1 { font-size: 2rem; color: #0ff; text-shadow: 0 0 15px #0ff; margin-bottom: 20px; }
        .btn { background: none; border: 2px solid #0ff; color: #0ff; padding: 15px; font-family: 'Orbitron'; font-weight: bold; border-radius: 8px; margin: 10px; width: 250px; text-transform: uppercase; font-size: 14px; }
        .btn:active { background: #0ff; color: #000; }

        #hud { position: absolute; top: 10px; width: 100%; padding: 0 20px; box-sizing: border-box; display: flex; justify-content: space-between; pointer-events: none; z-index: 50; }
        #pause-btn { pointer-events: auto; background: rgba(0,255,255,0.2); border: 1px solid #0ff; color: #0ff; padding: 5px 10px; border-radius: 5px; font-size: 10px; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="info">SCORE: 0<br><span id="biome-txt" style="font-size:10px; color:#aaa">ESPACE</span></div>
        <button id="pause-btn" onclick="togglePause()">PAUSE</button>
    </div>

    <div id="menu-main" class="ui-screen">
        <h1>CYBER-CACA</h1>
        <button class="btn" onclick="startGame()">COMMENCER</button>
        <button class="btn" id="diff-btn" onclick="changeDiff()">MODE: NORMAL</button>
        <div style="margin-top:20px; font-size:10px">SENSIVITÉ</div>
        <input type="range" min="1" max="5" value="2.5" id="sensi" style="width:200px; accent-color:#0ff">
    </div>

    <div id="menu-pause" class="ui-screen hidden">
        <h1>PAUSE</h1>
        <button class="btn" onclick="togglePause()">REPRENDRE</button>
        <button class="btn" onclick="location.reload()">QUITTER</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- CHARGEMENT DES ASSETS ---
        const playerImg = new Image(); playerImg.src = 'image.JPEG';
        const music = new Audio('caca.mp3'); music.loop = true;
        const shotSound = new Audio('tire.mp3'); shotSound.preload = 'auto';

        // --- VARIABLES DE JEU ---
        let gameActive = false;
        let paused = false;
        let score = 0;
        let diff = 1;
        let enemies = [];
        let lasers = [];
        let playerX = canvas.width / 2 - 45;
        let targetX = playerX;
        let biomeIdx = 0;

        const biomes = [
            { name: "ESPACE", bg: "#000810", color: "#0ff", icon: "💩" },
            { name: "VOLCAN", bg: "#200000", color: "#f00", icon: "🔥" },
            { name: "TOXIQUE", bg: "#002000", color: "#3f3", icon: "🤢" }
        ];

        function changeDiff() {
            if (diff === 1) { diff = 1.8; document.getElementById('diff-btn').innerText = "MODE: EXPERT"; }
            else if (diff === 1.8) { diff = 3; document.getElementById('diff-btn').innerText = "MODE: MASTER"; }
            else { diff = 1; document.getElementById('diff-btn').innerText = "MODE: NORMAL"; }
        }

        function togglePause() {
            if (!gameActive) return;
            paused = !paused;
            document.getElementById('menu-pause').classList.toggle('hidden', !paused);
            if (paused) music.pause(); else music.play();
        }

        function startGame() {
            gameActive = true;
            score = 0;
            enemies = [];
            lasers = [];
            document.getElementById('menu-main').classList.add('hidden');
            music.play().catch(() => {}); // Safari unlock
            requestAnimationFrame(update);
        }

        function update() {
            if (!gameActive || paused) return;

            // Biomes
            biomeIdx = Math.min(biomes.length - 1, Math.floor(score / 200));
            document.getElementById('biome-txt').innerText = biomes[biomeIdx].name;
            document.getElementById('info').childNodes[0].nodeValue = "SCORE: " + score;

            // Mouvement
            let sensi = document.getElementById('sensi').value;
            playerX += (targetX - playerX) * (0.05 * sensi);

            // Apparition ennemis
            if (Math.random() < 0.02 * diff) {
                enemies.push({ x: Math.random() * (canvas.width - 50), y: -50, s: 40 + Math.random() * 20, spd: (3 + score / 150) * (diff * 0.9) });
            }

            // Update Lasers
            lasers.forEach((l, i) => {
                l.y -= 12;
                if (l.y < -20) lasers.splice(i, 1);
            });

            // Update Ennemis
            enemies.forEach((en, i) => {
                en.y += en.spd;
                
                // Collision Laser
                lasers.forEach((l, li) => {
                    if (Math.hypot(en.x + en.s/2 - l.x, en.y - l.y) < en.s) {
                        enemies.splice(i, 1); lasers.splice(li, 1);
                        score += 10;
                    }
                });

                // Collision Joueur
                if (en.y > canvas.height - 140 && Math.abs((en.x + en.s/2) - (playerX + 45)) < 45) {
                    gameActive = false;
                    alert("GAME OVER ! SCORE: " + score);
                    location.reload();
                }
                if (en.y > canvas.height + 50) enemies.splice(i, 1);
            });

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            let b = biomes[biomeIdx];
            ctx.fillStyle = b.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Lasers
            ctx.fillStyle = b.color;
            lasers.forEach(l => ctx.fillRect(l.x, l.y, 4, 20));

            // Joueur
            ctx.drawImage(playerImg, playerX, canvas.height - 150, 90, 90);

            // Ennemis
            ctx.font = "40px serif";
            enemies.forEach(en => ctx.fillText(b.icon, en.x, en.y));
        }

        // --- COMMANDES ---
        window.addEventListener('touchmove', (e) => {
            targetX = e.touches[0].clientX - 45;
        }, { passive: false });

        window.addEventListener('touchstart', (e) => {
            if (gameActive && !paused && e.target.id !== 'pause-btn') {
                lasers.push({ x: playerX + 45, y: canvas.height - 140 });
                let s = shotSound.cloneNode(); s.volume = 0.4; s.play();
                if (music.paused) music.play();
            }
        });
    </script>
</body>
</html>
