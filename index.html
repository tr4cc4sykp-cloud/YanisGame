<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-CACA : OMEGA SOUND EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        :root { --neon: #00ffff; --pink: #ff00ff; }
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Orbitron', sans-serif; color: white; }
        canvas { display: block; }

        /* INTERFACE */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(15px); background: rgba(0,0,0,0.8); transition: 0.3s; }
        .hidden { display: none !important; }
        
        h1 { font-size: 2.5rem; text-align: center; color: #fff; text-shadow: 0 0 20px var(--neon); margin: 0 0 30px 0; }
        .btn { pointer-events: auto; background: none; border: 2px solid var(--neon); color: var(--neon); padding: 15px 40px; font-family: 'Orbitron'; font-weight: 900; border-radius: 5px; margin: 10px; cursor: pointer; width: 260px; text-transform: uppercase; }
        .btn:active { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }
        .btn-pink { border-color: var(--pink); color: var(--pink); }

        #hud { position: absolute; top: 0; width: 100%; padding: 20px; box-sizing: border-box; display: flex; justify-content: space-between; z-index: 50; pointer-events: none; }
        #pause-trigger { pointer-events: auto; background: rgba(255,255,255,0.1); border: 1px solid var(--neon); color: var(--neon); padding: 10px 15px; border-radius: 5px; font-weight: 900; }
        .stat-val { color: var(--neon); text-shadow: 0 0 10px var(--neon); font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="hud">
        <div><div class="stat-val">SCORE: <span id="cur-score">0</span></div></div>
        <button id="pause-trigger" onclick="game.togglePause()">PAUSE</button>
    </div>

    <div id="menu-main" class="overlay">
        <h1>CYBER-CACA</h1>
        <button class="btn" onclick="game.start()">ENGAGE</button>
    </div>

    <div id="menu-pause" class="overlay hidden">
        <h1>PAUSE</h1>
        <button class="btn" onclick="game.togglePause()">REPRENDRE</button>
        <button class="btn btn-pink" onclick="game.quitToMenu()">MENU</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // ASSETS
        const img = new Image(); img.src = 'image.JPEG';
        const music = new Audio('caca.mp3'); music.loop = true; music.volume = 0.5;
        
        // Fonction pour jouer le son de tir sans couper la musique
        function playShootSound() {
            const shot = new Audio('tire.mp3');
            shot.volume = 0.8;
            shot.play();
        }

        const game = {
            state: 'MENU',
            score: 0,
            playerX: canvas.width / 2 - 45,
            enemies: [],
            lasers: [],

            start() {
                this.state = 'PLAYING';
                this.score = 0;
                this.enemies = [];
                this.lasers = [];
                document.getElementById('menu-main').classList.add('hidden');
                music.play().catch(() => {});
                this.spawn();
                this.render();
            },

            togglePause() {
                if (this.state === 'PLAYING') {
                    this.state = 'PAUSED';
                    music.pause();
                    document.getElementById('menu-pause').classList.remove('hidden');
                } else if (this.state === 'PAUSED') {
                    this.state = 'PLAYING';
                    music.play();
                    document.getElementById('menu-pause').classList.add('hidden');
                }
            },

            quitToMenu() {
                this.state = 'MENU';
                music.pause();
                document.getElementById('menu-pause').classList.add('hidden');
                document.getElementById('menu-main').classList.remove('hidden');
            },

            spawn() {
                if (this.state !== 'PLAYING') return;
                this.enemies.push({
                    x: Math.random() * (canvas.width - 60),
                    y: -60,
                    s: Math.random() * 40 + 40,
                    spd: 5 + (this.score / 100)
                });
                setTimeout(() => this.spawn(), 700);
            },

            update() {
                if (this.state !== 'PLAYING') return;

                this.lasers.forEach((l, i) => {
                    l.y -= 15;
                    if (l.y < 0) this.lasers.splice(i, 1);
                });

                this.enemies.forEach((en, i) => {
                    en.y += en.spd;
                    this.lasers.forEach((l, li) => {
                        if (Math.hypot(en.x + en.s/2 - l.x, en.y + en.s/2 - l.y) < en.s/1.2) {
                            this.enemies.splice(i, 1);
                            this.lasers.splice(li, 1);
                            this.score += 10;
                            document.getElementById('cur-score').innerText = this.score;
                        }
                    });
                    if (en.y > canvas.height - 160 && Math.abs((en.x + en.s/2) - (this.playerX + 45)) < 50) this.quitToMenu();
                });
            },

            draw() {
                ctx.fillStyle = '#000818';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
                ctx.drawImage(img, this.playerX, canvas.height - 150, 90, 90);
                ctx.fillStyle = '#39ff14';
                this.lasers.forEach(l => ctx.fillRect(l.x, l.y, 4, 25));
                ctx.shadowBlur = 0;
                this.enemies.forEach(en => { ctx.font = en.s + "px serif"; ctx.fillText("💩", en.x, en.y); });
            },

            render() {
                if (this.state === 'MENU') return;
                this.update();
                this.draw();
                requestAnimationFrame(() => this.render());
            }
        };

        window.addEventListener('touchmove', (e) => {
            if(game.state === 'PLAYING') game.playerX = e.touches[0].clientX - 45;
        });

        window.addEventListener('touchstart', (e) => {
            if(game.state === 'PLAYING' && e.target.id !== 'pause-trigger') {
                game.lasers.push({ x: game.playerX + 45, y: canvas.height - 150 });
                playShootSound(); // On déclenche le nouveau son ici
            }
        });
    </script>
</body>
</html>
