<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-CACA : OMEGA FURY</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }
        
        .ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        #hud { padding: 20px; display: flex; justify-content: space-between; color: #0ff; text-shadow: 0 0 15px #0ff; font-weight: 900; font-size: 20px; }
        
        #fury-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 200px; height: 10px; border: 2px solid #f0f; border-radius: 5px; overflow: hidden; }
        #fury-fill { width: 0%; height: 100%; background: #f0f; box-shadow: 0 0 20px #f0f; transition: width 0.2s; }

        .menu { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(20px); }
        .hidden { display: none !important; }
        
        h1 { font-size: 3rem; text-align: center; color: #fff; text-shadow: 0 0 20px #f0f; margin: 0; }
        .btn { pointer-events: auto; background: #0ff; color: #000; border: none; padding: 20px 50px; font-family: 'Orbitron'; font-weight: 900; font-size: 1.2rem; border-radius: 50px; margin-top: 30px; box-shadow: 0 0 30px rgba(0,255,255,0.5); }
        
        #msg { position: absolute; top: 50%; width: 100%; text-align: center; font-size: 2rem; color: #f1c40f; opacity: 0; transition: 0.3s; transform: scale(0.5); }
        .pop { opacity: 1 !important; transform: scale(1.2) !important; }
    </style>
</head>
<body>

    <div class="ui">
        <div id="hud">
            <div id="score">SCORE: 0</div>
            <div id="multiplier">X1</div>
        </div>
        <div id="fury-bar"><div id="fury-fill"></div></div>
        <div id="msg">MEGA PUMP !!</div>
    </div>

    <div id="menu" class="menu">
        <h1>CYBER CACA<br><span style="color:#0ff; font-size:1.5rem">OMEGA FURY</span></h1>
        <button class="btn" onclick="game.start()">ENGAGE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const img = new Image(); img.src = 'image.JPEG';
        const music = new Audio('caca.mp3'); music.loop = true;

        const game = {
            active: false,
            score: 0,
            fury: 0,
            shake: 0,
            playerX: canvas.width / 2 - 45,
            enemies: [],
            lasers: [],
            particles: [],
            stars: Array(50).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*3 })),

            start() {
                this.active = true; this.score = 0; this.fury = 0;
                this.enemies = []; this.lasers = []; this.particles = [];
                document.getElementById('menu').classList.add('hidden');
                music.play().catch(() => {});
                this.spawn();
                this.loop();
            },

            spawn() {
                if (!this.active) return;
                let isElite = Math.random() < 0.2;
                this.enemies.push({
                    x: Math.random() * (canvas.width - 60),
                    y: -100,
                    s: isElite ? 80 : 50,
                    spd: (Math.random() * 5 + 4) + (this.score / 200),
                    hp: isElite ? 3 : 1,
                    zigzag: isElite ? 0.05 : 0,
                    offset: Math.random() * 100
                });
                setTimeout(() => this.spawn(), Math.max(200, 800 - this.score/10));
            },

            explode(x, y, color) {
                for(let i=0; i<15; i++) {
                    this.particles.push({ x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 1, c: color });
                }
                this.shake = 15;
            },

            update() {
                if (this.shake > 0) this.shake *= 0.9;
                
                // Fury Logic
                this.fury = Math.max(0, this.fury - 0.1);
                document.getElementById('fury-fill').style.width = this.fury + "%";
                if(this.fury >= 100) {
                    this.fury = 0;
                    this.triggerMegaPump();
                }

                this.stars.forEach(s => {
                    s.y += (this.fury > 0 ? 20 : 5);
                    if(s.y > canvas.height) s.y = 0;
                });

                this.lasers.forEach((l, i) => {
                    l.y -= 20;
                    if (l.y < 0) this.lasers.splice(i, 1);
                });

                this.enemies.forEach((en, i) => {
                    en.y += en.spd;
                    en.x += Math.sin(en.y * en.zigzag + en.offset) * 5;
                    
                    this.lasers.forEach((l, li) => {
                        if (Math.hypot(en.x + en.s/2 - l.x, en.y + en.s/2 - l.y) < en.s/1.2) {
                            en.hp--;
                            this.lasers.splice(li, 1);
                            if(en.hp <= 0) {
                                this.explode(en.x + en.s/2, en.y + en.s/2, '#0ff');
                                this.enemies.splice(i, 1);
                                this.score += 10;
                                this.fury = Math.min(100, this.fury + 15);
                                document.getElementById('score').innerText = "SCORE: " + this.score;
                            }
                        }
                    });

                    if (en.y > canvas.height - 160 && Math.abs((en.x + en.s/2) - (this.playerX + 45)) < 50) this.gameOver();
                });

                this.particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                    if(p.life <= 0) this.particles.splice(i, 1);
                });
            },

            triggerMegaPump() {
                const m = document.getElementById('msg');
                m.classList.add('pop');
                setTimeout(() => m.classList.remove('pop'), 2000);
                // Rafale de lasers
                let count = 0;
                let interval = setInterval(() => {
                    this.lasers.push({ x: this.playerX + 10, y: canvas.height - 150 });
                    this.lasers.push({ x: this.playerX + 45, y: canvas.height - 180 });
                    this.lasers.push({ x: this.playerX + 80, y: canvas.height - 150 });
                    count++;
                    if(count > 20) clearInterval(interval);
                }, 100);
            },

            draw() {
                ctx.save();
                if(this.shake > 1) ctx.translate((Math.random()-0.5)*this.shake, (Math.random()-0.5)*this.shake);
                
                ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#fff';
                this.stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

                this.lasers.forEach(l => {
                    ctx.shadowBlur = 10; ctx.shadowColor = '#0ff';
                    ctx.fillStyle = '#0ff'; ctx.fillRect(l.x, l.y, 5, 25);
                });

                ctx.shadowBlur = 20; ctx.shadowColor = (this.fury > 80 ? '#f0f' : '#0ff');
                ctx.drawImage(img, this.playerX, canvas.height - 150, 90, 90);

                ctx.shadowBlur = 0;
                this.enemies.forEach(en => {
                    ctx.font = en.s + "px serif";
                    ctx.fillText(en.hp > 1 ? "🛸" : "💩", en.x, en.y);
                });

                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life; ctx.fillStyle = p.c;
                    ctx.fillRect(p.x, p.y, 4, 4);
                });
                
                ctx.restore();
            },

            loop() {
                if (!this.active) return;
                this.update(); this.draw();
                requestAnimationFrame(() => this.loop());
            },

            gameOver() {
                this.active = false; music.pause();
                document.getElementById('menu').classList.remove('hidden');
                document.querySelector('h1').innerHTML = "SCORE: " + this.score + "<br><span style='font-size:1rem'>T'AS ÉTÉ CACA-TÉ</span>";
            }
        };

        window.addEventListener('touchmove', (e) => { game.playerX = e.touches[0].clientX - 45; });
        window.addEventListener('touchstart', () => { if(game.active) game.lasers.push({ x: game.playerX + 45, y: canvas.height - 150 }); });
    </script>
</body>
</html>
