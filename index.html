<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-CACA : ELITE EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Orbitron', sans-serif; color: white; }
        canvas { display: block; }
        .menu-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .menu-overlay.hidden { display: none; }
        h1 { font-size: 2.5rem; color: #0ff; text-shadow: 0 0 20px #0ff; margin-bottom: 40px; letter-spacing: 5px; }
        .btn { background: none; border: 2px solid #0ff; color: #0ff; padding: 15px 40px; font-family: 'Orbitron'; font-weight: 900; border-radius: 5px; margin: 10px; cursor: pointer; width: 250px; box-shadow: 0 0 10px rgba(0,255,255,0.2); }
        .btn:active { background: #0ff; color: #000; }
        #hud { position: absolute; top: 20px; left: 20px; color: #0ff; text-shadow: 0 0 10px #0ff; font-weight: 900; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
    <div id="hud">SCORE: 0</div>
    <div id="menu" class="menu-overlay">
        <h1>CYBER-CACA</h1>
        <button class="btn" onclick="start()">DEMARRER MISSION</button>
        <button class="btn" style="border-color:#f0f; color:#f0f;" onclick="alert('Difficulté: CACA MASTER activée !')">DIFFICULTÉ</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');
        const menu = document.getElementById('menu');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0, active = false, playerX = canvas.width/2;
        let enemies = [], lasers = [];
        const img = new Image(); img.src = 'image.JPEG';
        const music = new Audio('caca.mp3'); music.loop = true;

        function start() {
            score = 0; enemies = []; lasers = []; active = true;
            menu.classList.add('hidden');
            music.play().catch(()=>{});
            animate();
            spawn();
        }

        function spawn() {
            if(!active) return;
            enemies.push({ x: Math.random()*canvas.width, y: -50, s: Math.random()*40+40, spd: 4 + score/100 });
            setTimeout(spawn, 800);
        }

        window.addEventListener('touchmove', (e) => { playerX = e.touches[0].clientX - 45; });
        window.addEventListener('touchstart', () => { if(active) lasers.push({x: playerX + 45, y: canvas.height - 150}); });

        function animate() {
            if(!active) return;
            ctx.fillStyle = 'rgba(0, 5, 15, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Joueur
            ctx.shadowBlur = 15; ctx.shadowColor = '#0ff';
            ctx.drawImage(img, playerX, canvas.height - 150, 90, 90);

            // Lasers
            ctx.fillStyle = '#39ff14';
            lasers.forEach((l, i) => {
                l.y -= 10;
                ctx.fillRect(l.x, l.y, 4, 20);
                if(l.y < 0) lasers.splice(i, 1);
            });

            // Ennemis
            enemies.forEach((en, i) => {
                en.y += en.spd;
                ctx.font = en.s + "px serif";
                ctx.fillText("💩", en.x, en.y);

                // Collision Laser
                lasers.forEach((l, li) => {
                    if(Math.hypot(en.x - l.x, en.y - l.y) < en.s) {
                        enemies.splice(i, 1); lasers.splice(li, 1);
                        score += 10; hud.innerText = "SCORE: " + score;
                    }
                });

                // Collision Player
                if(en.y > canvas.height - 150 && Math.abs(en.x - playerX) < 60) {
                    active = false; menu.classList.remove('hidden');
                    h1 = document.querySelector('h1').innerText = "SCORE: " + score;
                    music.pause();
                }
                if(en.y > canvas.height) enemies.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
